<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>OAS Bay</h2>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="customer.html">Customer Registration</a></li>
        <li><a href="technician.html">Technician Registration</a></li>
        <li><a href="customers.html">Customer Records</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h1>Technician Registration</h1>

        <form>
            <label>Technician ID</label>
            <input type="text" placeholder="Enter Technician ID">

            <label>Full Name</label>
            <input type="text" placeholder="Enter Full Name">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter Phone Number">

            <label>Email Address</label>
            <input type="email" placeholder="Enter Email">

            <label>Specialization</label>
            <select>
                <option>Engine Repair</option>
                <option>Brake Service</option>
                <option>Wheel Alignment</option>
                <option>Oil Change</option>
                <option>Electrical Repair</option>
            </select>

            <button type="submit">Register Technician</button>
            <button type="reset">Reset</button>
        </form>
    </div>
</div>

</body>
</html>
