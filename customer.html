<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>OAS Bay</h2>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="customer.html">Customer Registration</a></li>
        <li><a href="technician.html">Technician Registration</a></li>
        <li><a href="customers.html">Customer Records</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h1>Customer Registration</h1>

        <form>
            <label>Customer ID</label>
            <input type="text" placeholder="Enter Customer ID">

            <label>Full Name</label>
            <input type="text" placeholder="Enter Full Name">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter Phone Number">

            <label>Email Address</label>
            <input type="email" placeholder="Enter Email">

            <label>Address</label>
            <input type="text" placeholder="Enter Address">

            <label>Vehicle Number Plate</label>
            <input type="text" placeholder="Enter Plate Number">

            <label>Vehicle Make</label>
            <select>
                <option>Toyota</option>
                <option>Nissan</option>
                <option>Subaru</option>
                <option>Mitsubishi</option>
                <option>Honda</option>
            </select>

            <label>Vehicle Model</label>
            <input type="text" placeholder="Enter Vehicle Model">

            <button type="submit">Save Customer</button>
            <button type="reset">Reset</button>
        </form>
    </div>
</div>

</body>
</html>
